# ~/.tmux.conf
# Brent / ghostvox — Subliminal Dark

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── Core settings ─────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1
set-option -g allow-rename off
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Reload ────────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " Config reloaded!"

# ── Vi mode ───────────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
set -g status-keys vi

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line
bind-key -T copy-mode-vi g   send-keys -X history-top
bind-key -T copy-mode-vi G   send-keys -X history-bottom
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up
bind-key -T copy-mode-vi /   command-prompt -p "search down:" "send-keys -X search-forward '%%%'"
bind-key -T copy-mode-vi ?   command-prompt -p "search up:"   "send-keys -X search-backward '%%%'"
bind-key -T copy-mode-vi n   send-keys -X search-again
bind-key -T copy-mode-vi N   send-keys -X search-reverse
bind-key -T copy-mode-vi w   send-keys -X next-word
bind-key -T copy-mode-vi b   send-keys -X previous-word
bind-key -T copy-mode-vi e   send-keys -X next-word-end

bind C-u copy-mode \; send-keys -X halfpage-up
bind C-d send-keys -X halfpage-down

# ── Splits & windows ──────────────────────────────────────────────────────────
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind t new-window   -c "#{pane_current_path}"
bind q kill-pane
bind Q kill-window

# ── Pane navigation ───────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h previous-window
bind -r C-l next-window
bind -r [ previous-window
bind -r ] next-window

# ── Subliminal Dark palette ───────────────────────────────────────────────────
#   background   #0D1117   — editor/terminal bg
#   surface      #161B22   — active line, elevated panels
#   overlay      #21262D   — borders, elevated surfaces
#   muted        #2E343E   — element bg, disabled
#   subtle       #4E5A5F   — line numbers
#   text         #DCE0E5   — primary text
#   text.muted   #A9AFBC   — secondary text
#   text.dim     #878A98   — placeholders, disabled
#
#   accent       #F5906A   — type, enum, cursor (the signature orange)
#   function     #D6ACAC   — function names (the dusty rose)
#   property     #9FCDCC   — properties, teal-ish
#   keyword      #2F6B85   — keywords (deep teal-blue)
#   string       #FFD9B3   — strings (warm peach)
#   number       #FF9F43   — numbers (vivid orange)
#   operator     #4EC9B0   — operators (teal)
#   blue         #74ADE8   — info, labels, emphasis
#   namespace    #CD9FE9   — namespaces (soft purple)
#   macro        #FF6B6B   — macros (red)
#   constant     #C5BC91   — constants (olive)
#   version.mod  #F5906A   — modified (same as accent)
#   added        #A1C181   — git added (sage green)

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#0D1117 fg=#DCE0E5"

# Left: prefix flash (accent orange when active) + session name
set -g status-left "\
#[fg=#0D1117,bg=#F5906A,bold] #{?client_prefix,  ,  } \
#[fg=#F5906A,bg=#21262D]\
#[fg=#DCE0E5,bg=#21262D] #S \
#[fg=#21262D,bg=#0D1117]  "

# Right: git branch | clock | date
set -g status-right "\
#[fg=#4E5A5F,bg=#0D1117]│\
#[fg=#9FCDCC,bg=#0D1117] #{?#{!=:#{pane_current_path},},#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/ /'),} \
#[fg=#4E5A5F]│\
#[fg=#FFD9B3] %H:%M \
#[fg=#4E5A5F]│\
#[fg=#A9AFBC] %a %d %b "

set -g status-left-length 40
set -g status-right-length 80

# ── Window tabs ───────────────────────────────────────────────────────────────
setw -g window-status-current-style ""
setw -g window-status-style         ""

# Active: D6ACAC (function rose) badge for number, surface bg for name
setw -g window-status-current-format "\
#[fg=#0D1117,bg=#D6ACAC] #I \
#[fg=#D6ACAC,bg=#21262D]\
#[fg=#DCE0E5,bg=#21262D,bold] #W \
#[fg=#21262D,bg=#0D1117]"

# Inactive: dim text, no background
setw -g window-status-format "\
#[fg=#4E5A5F,bg=#0D1117] #I  #W "

setw -g window-status-separator ""

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#21262D"
set -g pane-active-border-style "fg=#F5906A"

set -g display-panes-colour        "#4E5A5F"
set -g display-panes-active-colour "#F5906A"
set -g display-panes-time 2000

# ── Messages & mode ───────────────────────────────────────────────────────────
# message bg: string peach — feels native to the theme
set -g message-style         "fg=#0D1117 bg=#FFD9B3 bold"
# command prompt: accent orange
set -g message-command-style "fg=#0D1117 bg=#F5906A bold"
# copy mode selection: blue info highlight from theme
set -g mode-style            "fg=#0D1117 bg=#74ADE8"

# ── Clock ─────────────────────────────────────────────────────────────────────
set -g clock-mode-colour "#F5906A"
set -g clock-mode-style  24
