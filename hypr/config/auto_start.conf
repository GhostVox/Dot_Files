# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$browser = chromium --ozone-platform=wayland --enable-features=UseOzonePlatform,WaylandWindowDecorations

# Core Display/D-Bus Environment Setup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Core Desktop Shell (Launches top bars, panel daemons, notification handlers, and clipboard managers)
exec-once = noctalia -d

# Hardware & Connectivity Applets
exec-once = nm-applet --indicator

# System Management
exec-once = hypridle

# Compositor Plugins
exec-once = hyprctl plugin load "$HYPR_PLUGIN_DIR/lib/libhyprexpo.so"
exec-once = hyprpm reload -n

