# ============================================================
#  Subliminal Dark — kitty theme
#  Ported from the Zed "Subliminal Dark" variant by GhostVox
#  Source palette: https://github.com/GhostVox/subliminal-theme
#
#  Usage:
#    Drop this in ~/.config/kitty/ and add to kitty.conf:
#      include subliminal-dark.conf
#    Or place it in ~/.config/kitty/themes/ and pick it with
#    `kitten themes` / the theme selector.
# ============================================================

# ---- Basic colors ----
foreground            #abb2bf
background            #0D1117
selection_foreground  #0D1117
selection_background  #8FBDC9

# ---- Cursor ----
cursor                #F5906A
cursor_text_color     #0D1117

# ---- URLs ----
url_color             #74ade8

# ---- Window & tab borders ----
active_border_color   #F5906A
inactive_border_color #21262d
bell_border_color     #e5c07b

# ---- Tab bar ----
tab_bar_background      #0D1117
active_tab_foreground   #0D1117
active_tab_background   #F5906A
active_tab_font_style   bold
inactive_tab_foreground #a9afbc
inactive_tab_background #21262d
inactive_tab_font_style normal

# ---- Marks ----
mark1_foreground #0D1117
mark1_background #F5906A
mark2_foreground #0D1117
mark2_background #8FBDC9
mark3_foreground #0D1117
mark3_background #c678dd

